<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JK-LIFE | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .gold-text { background: linear-gradient(to right, #d4af37, #f2d472, #d4af37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; letter-spacing: 2px; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; position: relative; transition: transform 0.3s ease; }
        .nav-item { color: #555; font-size: 0.7rem; display: flex; flex-direction: column; align-items: center; gap: 5px; text-decoration: none; transition: all 0.4s; }
        .nav-item.active { color: #d4af37; transform: translateY(-3px); }
        .page { display: none; padding-bottom: 40px; }
        .page.active { display: block; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Loader Design */
        #loading-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; flex-direction: column; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
    </style>
</head>
<body class="pb-28">

    <div id="loading-overlay">
        <div class="w-14 h-14 border-2 border-[#d4af37]/20 border-t-[#d4af37] rounded-full animate-spin mb-6"></div>
        <p class="text-[#d4af37] text-[10px] tracking-[0.3em] uppercase font-bold">Synchronisiere Cloud...</p>
    </div>

    <header class="pt-12 pb-8 px-6 text-center sticky top-0 bg-[#050505]/80 backdrop-blur-md z-50">
        <div class="flex justify-between items-center max-w-md mx-auto relative">
            <div id="admin-save-btn"></div> <div class="mx-auto text-center">
                <h1 class="text-4xl gold-text uppercase tracking-tighter">JK-LIFE</h1>
                <div class="h-[1px] w-20 bg-gradient-to-r from-transparent via-[#d4af37] to-transparent mx-auto mt-3"></div>
            </div>
            <button onclick="window.loginPrompt()" class="absolute right-0 text-gray-700 hover:text-[#d4af37] transition-colors p-2"><i class="fas fa-shield-alt text-xl"></i></button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-6">
        <section id="start" class="page active space-y-8">
            <div id="moments-list" class="space-y-8"></div>
            <div id="admin-moment-btn"></div> </section>

        <section id="musik" class="page space-y-4">
            <div id="songs-list" class="space-y-3"></div>
            <div id="admin-song-btn"></div> </section>

        <section id="kontakt" class="page space-y-4 pt-4">
            <div id="contacts-list" class="space-y-4"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0a0a0a]/95 backdrop-blur-3xl border-t border-white/5 px-10 py-6 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <a href="javascript:void(0)" onclick="showPage('start', this)" class="nav-item active"><i class="fas fa-th-large text-xl"></i><span>Momente</span></a>
            <a href="javascript:void(0)" onclick="showPage('musik', this)" class="nav-item"><i class="fas fa-compact-disc text-xl"></i><span>Musik</span></a>
            <a href="javascript:void(0)" onclick="showPage('kontakt', this)" class="nav-item"><i class="fas fa-paper-plane text-xl"></i><span>Kontakt</span></a>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeGsLFF1jBoF8Ao8xy7OtcMhu5b4z_zVg",
            authDomain: "jerome-website-da5b3.firebaseapp.com",
            projectId: "jerome-website-da5b3",
            storageBucket: "jerome-website-da5b3.firebasestorage.app",
            messagingSenderId: "95494190010",
            appId: "1:95494190010:web:6d6715eb22e0993873a383"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let songs = [];
        let moments = [];
        let contacts = [
            {p: 'Instagram', n: '@jerome_life', i: 'fa-instagram', l: 'https://instagram.com/jerome_life'},
            {p: 'Snapchat', n: 'jerome.jk', i: 'fa-snapchat', l: '#'},
            {p: 'E-Mail', n: 'info@jerome.de', i: 'fa-envelope', l: 'mailto:info@jerome.de'},
            {p: 'Mobil', n: '+49 151 ...', i: 'fa-phone', l: 'tel:+49151...'}
        ];

        window.showPage = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active');
            window.scrollTo(0,0);
        };

        window.renderAll = () => {
            const isAdmin = auth.currentUser !== null;
            
            // Admin UI Elemente erzeugen oder leeren
            document.getElementById('admin-save-btn').innerHTML = isAdmin ? `<button onclick="window.saveData()" class="bg-[#d4af37] text-black px-4 py-2 rounded-full text-[10px] font-black shadow-[0_0_20px_rgba(212,175,55,0.4)]">SAVE CLOUD</button>` : '';
            document.getElementById('admin-moment-btn').innerHTML = isAdmin ? `<button onclick="window.addMoment()" class="w-full py-5 border-2 border-dashed border-[#d4af37]/30 rounded-3xl text-[#d4af37] text-xs font-bold tracking-widest">+ NEUER MOMENT</button>` : '';
            document.getElementById('admin-song-btn').innerHTML = isAdmin ? `<button onclick="window.addSong()" class="w-full py-5 border-2 border-dashed border-[#d4af37]/30 rounded-3xl text-[#d4af37] text-xs font-bold tracking-widest">+ NEUER SONG</button>` : '';

            // Listen rendern
            document.getElementById('songs-list').innerHTML = songs.map((s, i) => `
                <div class="glass-card p-5 flex items-center gap-5">
                    <div class="w-12 h-12 bg-[#d4af37]/10 rounded-2xl flex items-center justify-center text-[#d4af37] border border-[#d4af37]/20 shadow-inner"><i class="fas fa-play text-xs"></i></div>
                    <div class="flex-1">
                        <div class="font-bold text-sm text-gray-100">${s.title}</div>
                        <div class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">${s.artist}</div>
                    </div>
                    ${isAdmin ? `<button onclick="window.removeData('songs', ${i})" class="text-red-500/40 p-2 text-xs">✕</button>` : ''}
                </div>
            `).join('');

            document.getElementById('moments-list').innerHTML = moments.map((m, i) => `
                <div class="glass-card overflow-hidden">
                    <img src="${m.img || 'https://images.unsplash.com/photo-1514525253361-bee8a48740ad?w=800'}" class="w-full h-80 object-cover opacity-60">
                    <div class="p-6 bg-gradient-to-t from-black via-black/80 to-transparent -mt-20 relative">
                        <div class="text-[10px] text-[#d4af37] font-black tracking-widest mb-2 uppercase">${m.date}</div>
                        <div class="text-sm text-gray-300 leading-relaxed font-light">${m.text}</div>
                    </div>
                    ${isAdmin ? `<button onclick="window.removeData('moments', ${i})" class="absolute top-4 right-4 bg-black/80 w-10 h-10 rounded-full flex items-center justify-center text-xs border border-white/10">✕</button>` : ''}
                </div>
            `).join('');

            document.getElementById('contacts-list').innerHTML = contacts.map(c => `
                <a href="${c.l}" class="glass-card p-6 flex justify-between items-center no-underline active:scale-95 transition-transform">
                    <div class="flex items-center gap-5">
                        <div class="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center text-[#d4af37] text-lg"><i class="fab ${c.i}"></i></div>
                        <div><div class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">${c.p}</div><div class="text-sm text-gray-200">${c.n}</div></div>
                    </div>
                    <i class="fas fa-external-link-alt text-[10px] text-gray-700"></i>
                </a>
            `).join('');
        };

        window.loginPrompt = async () => {
            const pass = prompt("JEROME ADMIN ACCESS:");
            if(!pass) return;
            try {
                // Wir verwenden admin@jerome.de als Standard-E-Mail
                await signInWithEmailAndPassword(auth, "admin@jerome.de", pass);
                alert("ACCESS GRANTED. Welcome Jerome.");
            } catch(e) {
                alert("ACCESS DENIED: " + e.message);
                console.error(e);
            }
        };

        window.addSong = () => {
            const title = prompt("Song Name:");
            const artist = prompt("Künstler:");
            if(title && artist) { songs.unshift({title, artist}); window.renderAll(); }
        };

        window.addMoment = () => {
            const text = prompt("Was gibt's Neues?");
            if(text) { moments.unshift({text, date: new Date().toLocaleDateString('de-DE'), img: ''}); window.renderAll(); }
        };

        window.removeData = (type, i) => {
            if(confirm("Löschen?")) {
                if(type === 'songs') songs.splice(i, 1); else moments.splice(i, 1);
                window.renderAll();
            }
        };

        window.saveData = async () => {
            try {
                await setDoc(doc(db, "content", "jk_pro_data"), { songs, moments });
                alert("CLOUD UPDATED SUCCESSFULLY ✅");
            } catch (e) {
                alert("SAVE FAILED: " + e.message);
            }
        };

        onAuthStateChanged(auth, (user) => {
            window.renderAll();
        });

        window.onload = async () => {
            try {
                const docSnap = await getDoc(doc(db, "content", "jk_pro_data"));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    songs = data.songs || [];
                    moments = data.moments || [];
                }
            } catch(e) { console.error("Cloud Error", e); }
            finally {
                setTimeout(() => {
                    document.getElementById('loading-overlay').style.opacity = '0';
                    setTimeout(() => document.getElementById('loading-overlay').remove(), 500);
                }, 800);
                window.renderAll();
            }
        };
    </script>
</body>
</html>
