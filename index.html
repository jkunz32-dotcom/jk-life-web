<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JK-LIFE | Premium</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #000; --gold: #e5c07b; --card: #111; --gray: #888; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 120px; }
        
        header { text-align: center; padding: 60px 20px 30px; }
        .logo { font-size: 2.5rem; font-weight: 900; color: var(--gold); letter-spacing: 8px; margin: 0; text-shadow: 0 0 15px rgba(229,192,123,0.3); }
        .underline { height: 3px; width: 80px; background: var(--gold); margin: 10px auto; border-radius: 2px; box-shadow: 0 0 10px var(--gold); }
        
        /* Admin-Steuerung */
        #save-btn { 
            position: fixed; top: 25px; left: 25px; background: var(--gold); border: none; 
            padding: 12px 20px; border-radius: 10px; font-weight: bold; z-index: 1002; 
            color: #000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
            box-shadow: 0 0 20px rgba(229,192,123,0.4);
        }
        .admin-gear { position: fixed; top: 25px; right: 25px; color: var(--gray); z-index: 1001; cursor: pointer; }

        .container { width: 92%; max-width: 500px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }

        /* Gemeinsames Design für Listen & Galerie */
        .list-item, .gallery-card { background: var(--card); border-radius: 25px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; position: relative; }
        
        /* Musik/Kontakt Style */
        .list-item { display: flex; align-items: center; }
        .list-img-box { width: 65px; height: 65px; margin-right: 20px; flex-shrink: 0; border-radius: 15px; overflow: hidden; background: #222; position: relative; cursor: pointer; }
        
        /* Galerie Style (Waagerechtes Format) */
        .gallery-img-box { 
            width: 100%; 
            aspect-ratio: 16 / 9; /* Erzwingt waagerechtes Format */
            border-radius: 18px; 
            overflow: hidden; 
            background: #222; 
            position: relative; 
            cursor: pointer;
            margin-bottom: 12px;
        }
        .main-img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Text für Galerie (Klein & Nebeneinander) */
        .gallery-meta { display: flex; justify-content: space-between; align-items: center; padding: 0 5px; }
        .gallery-text { font-size: 0.75rem; font-weight: 500; color: #fff; max-width: 65%; }
        .gallery-date { font-size: 0.65rem; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; }

        .edit-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; font-size: 10px; color: var(--gold); font-weight: bold; }
        .admin-mode .edit-overlay { display: flex; }
        
        /* Lösch-X oben rechts */
        .del-x { position: absolute; top: -8px; right: -8px; background: #ff4444; color: #fff; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.5); }

        /* Das "+" Feld (Mittig & kleiner) */
        .add-dashed-btn { 
            background: none; 
            border: 2px dashed #333; 
            color: var(--gold); 
            width: 70%; 
            margin: 25px auto; 
            padding: 12px; 
            border-radius: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            text-align: center; 
            display: none; 
            font-size: 0.85rem;
        }
        .admin-mode .add-dashed-btn { display: block; }

        /* Navigation */
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid #222; backdrop-filter: blur(15px); z-index: 1000; }
        .nav-item { color: var(--gray); text-decoration: none; font-size: 0.75rem; text-align: center; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { display: block; margin-bottom: 4px; width: 24px; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>

    <button id="save-btn" onclick="saveData()">CLOUD SPEICHERN</button>
    <div class="admin-gear" onclick="login()"><i data-lucide="settings"></i></div>

    <header>
        <p class="logo">JK-LIFE</p>
        <div class="underline"></div>
    </header>

    <div class="container">
        <div id="home" class="page active">
            <div id="gallery-list"></div>
            <div class="add-dashed-btn" onclick="addGalleryItem()">+ NEUEN MOMENT HINZUFÜGEN</div>
        </div>

        <div id="musik" class="page">
            <div id="music-list"></div>
            <div class="add-dashed-btn" onclick="addSong()">+ NEUEN SONG HINZUFÜGEN</div>
        </div>

        <div id="kontakt" class="page">
            <div id="contact-list"></div>
        </div>
    </div>

    <nav>
        <a href="#" class="nav-item active" data-page="home"><i data-lucide="home"></i>Start</a>
        <a href="#" class="nav-item" data-page="musik"><i data-lucide="music"></i>Musik</a>
        <a href="#" class="nav-item" data-page="kontakt"><i data-lucide="mail"></i>Kontakt</a>
    </nav>

    <script type="module">
        lucide.createIcons();
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeGsLFF1jBoF8Ao8xy7OtcMhu5b4z_zVg",
            authDomain: "jerome-website-da5b3.firebaseapp.com",
            projectId: "jerome-website-da5b3",
            storageBucket: "jerome-website-da5b3.firebasestorage.app",
            messagingSenderId: "95494190010",
            appId: "1:95494190010:web:6d6715eb22e0993873a383"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let data = {
            gallery: [],
            songs: [{img: '', name: 'Song Name', artist: 'Artist'}],
            contacts: [
                {img:'', label:'INSTAGRAM', value:'@deinname'},
                {img:'', label:'SNAPCHAT', value:'dein_snap'},
                {img:'', label:'E-MAIL', value:'kontakt@jk-life.de'},
                {img:'', label:'TELEFON', value:'0176...'}
            ]
        };

        async function load() {
            try {
                const snap = await getDoc(doc(db, "content", "jk_production_v2"));
                if (snap.exists()) data = snap.data();
                render();
            } catch(e) { render(); }
        }

        window.render = function() {
            const isAdmin = auth.currentUser != null;
            if(isAdmin) {
                document.body.classList.add('admin-mode');
                document.getElementById('save-btn').style.opacity = "1";
                document.getElementById('save-btn').style.pointerEvents = "auto";
            } else {
                document.body.classList.remove('admin-mode');
                document.getElementById('save-btn').style.opacity = "0";
                document.getElementById('save-btn').style.pointerEvents = "none";
            }

            // STARTSEITE / GALERIE
            document.getElementById('gallery-list').innerHTML = data.gallery.map((item, i) => `
                <div class="gallery-card">
                    ${isAdmin ? `<button class="del-x" onclick="removeGallery(${i})">X</button>` : ''}
                    <div class="gallery-img-box" onclick="changeImg('gallery', ${i})">
                        ${item.url.includes('.mp4') ? `<video src="${item.url}" class="main-img" autoplay muted loop></video>` : `<img src="${item.url || 'https://via.placeholder.com/600x337?text=Moment+wählen'}" class="main-img">`}
                        <div class="edit-overlay">BILD EDITIEREN</div>
                    </div>
                    <div class="gallery-meta">
                        <div class="gallery-text" contenteditable="${isAdmin}" oninput="data.gallery[${i}].text=this.innerText">${item.text || 'Bildunterschrift...'}</div>
                        <div class="gallery-date" contenteditable="${isAdmin}" oninput="data.gallery[${i}].date=this.innerText">${item.date || 'MAI 2026'}</div>
                    </div>
                </div>
            `).join('');

            // MUSIK
            document.getElementById('music-list').innerHTML = data.songs.map((s, i) => `
                <div class="list-item">
                    ${isAdmin ? `<button class="del-x" onclick="removeSong(${i})">X</button>` : ''}
                    <div class="list-img-box" onclick="changeImg('songs', ${i})">
                        <img src="${s.img || 'https://via.placeholder.com/100?text=?'}" class="list-img">
                        <div class="edit-overlay">EDIT</div>
                    </div>
                    <div style="flex:1">
                        <div style="font-weight:bold; font-size:1.1rem;" contenteditable="${isAdmin}" oninput="data.songs[${i}].name=this.innerText">${s.name}</div>
                        <div style="color:var(--gray); font-size:0.9rem;" contenteditable="${isAdmin}" oninput="data.songs[${i}].artist=this.innerText">${s.artist}</div>
                    </div>
                </div>
            `).join('');

            // KONTAKT
            document.getElementById('contact-list').innerHTML = data.contacts.map((c, i) => `
                <div class="list-item">
                    <div class="list-img-box" onclick="changeImg('contacts', ${i})">
                        <img src="${c.img || 'https://via.placeholder.com/100?text=?'}" class="list-img">
                        <div class="edit-overlay">EDIT</div>
                    </div>
                    <div style="flex:1">
                        <div style="color:var(--gold); font-size:0.75rem; letter-spacing:1px; margin-bottom:5px; font-weight:bold;">${c.label}</div>
                        <div contenteditable="${isAdmin}" oninput="data.contacts[${i}].value=this.innerText" style="font-size:1.05rem;">${c.value}</div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // LÖSCH-FUNKTIONEN
        window.removeSong = (i) => { data.songs.splice(i,1); render(); };
        window.removeGallery = (i) => { data.gallery.splice(i,1); render(); };

        // ADD-FUNKTIONEN
        window.addSong = () => { data.songs.push({img:'', name:'Song Name', artist:'Artist'}); render(); };
        window.addGalleryItem = () => { 
            data.gallery.unshift({url:'', text:'Bildunterschrift', date:'MAI 2026'}); 
            render(); 
        };
        
        window.changeImg = (type, i) => {
            if(!auth.currentUser) return;
            const url = prompt("Bild-URL einfügen:", data[type][i].url || data[type][i].img);
            if(url !== null) { 
                if(type === 'gallery') data.gallery[i].url = url;
                else data[type][i].img = url;
                render(); 
            }
        };

        window.login = async () => {
            const code = prompt("Admin-Code:");
            if(code) {
                try { await signInWithEmailAndPassword(auth, "admin@jk-life.de", code); }
                catch(e) { alert("Code falsch!"); }
            }
        };

        window.saveData = async () => {
            try {
                await setDoc(doc(db, "content", "jk_production_v2"), data);
                alert("Alles erfolgreich gespeichert! ✅");
            } catch(e) { alert("Fehler!"); }
        };

        onAuthStateChanged(auth, u => { render(); });

        document.querySelectorAll('.nav-item').forEach(n => n.addEventListener('click', e => {
            e.preventDefault();
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(n.dataset.page).classList.add('active');
            n.classList.add('active');
        }));

        load();
    </script>
</body>
</html>
