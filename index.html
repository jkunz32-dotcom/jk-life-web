<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JK-LIFE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .gold-text { background: linear-gradient(to right, #d4af37, #f2d472, #d4af37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; letter-spacing: 2px; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; position: relative; }
        .nav-item { color: #666; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none; transition: all 0.3s; }
        .nav-item.active { color: #d4af37; transform: translateY(-2px); }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Absoluter Schutz: Admin-Elemente sind standardmäßig komplett weg */
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
    </style>
</head>
<body class="pb-24">

    <div id="loading-overlay" class="fixed inset-0 bg-black z-[100] flex items-center justify-center text-center">
        <div>
            <div class="w-12 h-12 border-4 border-[#d4af37] border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-[#d4af37] text-sm font-medium tracking-widest uppercase">Lädt Daten...</p>
        </div>
    </div>

    <header class="pt-10 pb-6 px-6 text-center sticky top-0 bg-[#050505] z-50">
        <div class="flex justify-between items-center max-w-md mx-auto relative">
            <button onclick="window.saveData()" class="admin-only absolute left-0 bg-[#d4af37]/20 text-[#d4af37] px-4 py-2 rounded-full text-[10px] font-bold border border-[#d4af37]/30 shadow-[0_0_15px_rgba(212,175,55,0.2)]">CLOUD SPEICHERN</button>
            <div class="mx-auto text-center">
                <h1 class="text-3xl gold-text uppercase tracking-tighter">JK-LIFE</h1>
                <div class="h-[2px] w-16 bg-gradient-to-r from-transparent via-[#d4af37] to-transparent mx-auto mt-2"></div>
            </div>
            <button onclick="window.login()" class="absolute right-0 text-gray-600 p-2"><i class="fas fa-cog"></i></button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-6">
        <section id="start" class="page active space-y-6">
            <div id="moments-list" class="space-y-6"></div>
            <button onclick="addMoment()" class="admin-only w-full py-5 border-2 border-dashed border-gray-800 rounded-2xl text-gray-500 font-medium hover:border-[#d4af37]/50 transition-colors">+ NEUEN MOMENT</button>
        </section>

        <section id="musik" class="page space-y-4">
            <div id="songs-list" class="space-y-3"></div>
            <button onclick="addSong()" class="admin-only w-full py-5 border-2 border-dashed border-gray-800 rounded-2xl text-gray-500 font-medium hover:border-[#d4af37]/50 transition-colors">+ NEUEN SONG</button>
        </section>

        <section id="kontakt" class="page">
            <div id="contacts-list" class="space-y-4 pt-4"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0a0a0a]/95 backdrop-blur-2xl border-t border-white/5 px-8 py-5 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <a href="javascript:void(0)" onclick="showPage('start', this)" class="nav-item active"><i class="fas fa-home text-xl"></i><span>Start</span></a>
            <a href="javascript:void(0)" onclick="showPage('musik', this)" class="nav-item"><i class="fas fa-music text-xl"></i><span>Musik</span></a>
            <a href="javascript:void(0)" onclick="showPage('kontakt', this)" class="nav-item"><i class="fas fa-envelope text-xl"></i><span>Kontakt</span></a>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeGsLFF1jBoF8Ao8xy7OtcMhu5b4z_zVg",
            authDomain: "jerome-website-da5b3.firebaseapp.com",
            projectId: "jerome-website-da5b3",
            storageBucket: "jerome-website-da5b3.firebasestorage.app",
            messagingSenderId: "95494190010",
            appId: "1:95494190010:web:6d6715eb22e0993873a383"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let songs = [];
        let moments = [];
        // Deine vollständigen Kontakte
        const contacts = [
            {p: 'Instagram', n: '@jerome_life', i: 'fa-instagram', l: 'https://instagram.com/jerome_life'},
            {p: 'Snapchat', n: 'jerome.jk', i: 'fa-snapchat', l: '#'},
            {p: 'E-Mail', n: 'deine-email@beispiel.de', i: 'fa-envelope', l: 'mailto:deine-email@beispiel.de'},
            {p: 'Mobil', n: '+49 151 ...', i: 'fa-phone', l: 'tel:+49151...'}
        ];

        window.showPage = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active');
        };

        window.renderAll = () => {
            const isAdmin = document.body.classList.contains('is-admin');
            
            // Songs rendern
            document.getElementById('songs-list').innerHTML = songs.map((s, i) => `
                <div class="glass-card p-4 flex items-center gap-4">
                    <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center text-[#d4af37] shadow-inner"><i class="fas fa-play text-[10px]"></i></div>
                    <div class="flex-1"><div class="font-bold text-sm tracking-wide text-gray-200">${s.title}</div><div class="text-[10px] text-gray-500 uppercase tracking-widest mt-0.5">${s.artist}</div></div>
                    ${isAdmin ? `<button onclick="remove('songs', ${i})" class="text-red-900/50 hover:text-red-500 p-2 transition-colors text-xs">✕</button>` : ''}
                </div>
            `).join('');

            // Momente rendern
            document.getElementById('moments-list').innerHTML = moments.map((m, i) => `
                <div class="glass-card overflow-hidden group">
                    <img src="${m.img || 'https://images.unsplash.com/photo-1514525253361-bee8a48740ad?w=800'}" class="w-full h-72 object-cover opacity-60 group-hover:opacity-80 transition-opacity duration-700">
                    <div class="p-5 relative bg-gradient-to-t from-black/80 to-transparent">
                        <div class="text-[10px] text-[#d4af37] font-bold tracking-widest mb-1 italic uppercase">${m.date}</div>
                        <div class="text-sm text-gray-300 leading-relaxed font-light">${m.text}</div>
                    </div>
                    ${isAdmin ? `<button onclick="remove('moments', ${i})" class="absolute top-4 right-4 bg-black/60 backdrop-blur-md w-9 h-9 rounded-full flex items-center justify-center text-xs border border-white/10">✕</button>` : ''}
                </div>
            `).join('');

            // Kontakte rendern
            document.getElementById('contacts-list').innerHTML = contacts.map(c => `
                <a href="${c.l}" class="glass-card p-5 flex justify-between items-center group no-underline">
                    <span class="text-sm font-medium flex items-center gap-4"><i class="fab ${c.i} text-[#d4af37] text-lg opacity-80 group-hover:opacity-100 transition-opacity w-6 text-center"></i><span class="text-gray-300">${c.p}:</span> <span class="text-gray-500 ml-1 font-light">${c.n}</span></span>
                    <i class="fas fa-chevron-right text-[8px] text-gray-800 group-hover:text-[#d4af37] transition-colors"></i>
                </a>
            `).join('');
        };

        window.login = async () => {
            const code = prompt("Admin-Passwort:");
            if(code) {
                try { 
                    await signInWithEmailAndPassword(auth, "admin@jerome.de", code); 
                    alert("Zugriff gewährt, Jerome! 👑");
                } catch(e) { 
                    alert("Fehler (auth/invalid-credential): Passwort falsch oder User existiert nicht."); 
                }
            }
        };

        window.addSong = () => {
            const title = prompt("Song-Name:");
            const artist = prompt("Künstler:");
            if(title && artist) { songs.push({title, artist}); renderAll(); }
        };

        window.addMoment = () => {
            const text = prompt("Was ist neu?");
            if(text) { moments.push({text, date: new Date().toLocaleDateString('de-DE'), img: ''}); renderAll(); }
        };

        window.remove = (type, i) => {
            if(type === 'songs') songs.splice(i, 1); else moments.splice(i, 1);
            renderAll();
        };

        window.saveData = async () => {
            try {
                await setDoc(doc(db, "content", "jk_pro_data"), { songs, moments });
                alert("Cloud-Update erfolgreich! ✅");
            } catch (e) { alert("Fehler beim Speichern: " + e.message); }
        };

        onAuthStateChanged(auth, (user) => {
            if(user) document.body.classList.add('is-admin');
            else document.body.classList.remove('is-admin');
            renderAll();
        });

        window.onload = async () => {
            try {
                const docSnap = await getDoc(doc(db, "content", "jk_pro_data"));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    songs = data.songs || [];
                    moments = data.moments || [];
                }
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
                renderAll();
            }
        };
    </script>
</body>
</html>
