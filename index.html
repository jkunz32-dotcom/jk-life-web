<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JK-LIFE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; margin: 0; }
        .gold-text { background: linear-gradient(to right, #d4af37, #f2d472, #d4af37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; letter-spacing: 2px; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; position: relative; }
        .nav-item { color: #666; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none; }
        .nav-item.active { color: #d4af37; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Die Rettung: Admin-Sachen sind ABSOLUT unsichtbar ohne Login */
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
    </style>
</head>
<body class="pb-24">

    <div id="loading-overlay" class="fixed inset-0 bg-black z-[100] flex items-center justify-center">
        <div class="w-10 h-10 border-4 border-[#d4af37] border-t-transparent rounded-full animate-spin"></div>
    </div>

    <header class="pt-10 pb-6 px-6 text-center sticky top-0 bg-[#050505] z-50">
        <div class="flex justify-between items-center max-w-md mx-auto relative">
            <button onclick="window.saveData()" class="admin-only absolute left-0 bg-[#d4af37]/20 text-[#d4af37] px-4 py-2 rounded-full text-xs font-bold border border-[#d4af37]/30 shadow-lg">CLOUD SPEICHERN</button>
            <div class="mx-auto">
                <h1 class="text-3xl gold-text uppercase">JK-LIFE</h1>
                <div class="h-[2px] w-16 bg-gradient-to-r from-transparent via-[#d4af37] to-transparent mx-auto mt-2"></div>
            </div>
            <button onclick="window.login()" class="absolute right-0 text-gray-500 p-2"><i class="fas fa-cog"></i></button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-6">
        <section id="start" class="page active space-y-6">
            <div id="moments-list" class="space-y-6"></div>
            <button onclick="addMoment()" class="admin-only w-full py-4 border-2 border-dashed border-gray-800 rounded-2xl text-gray-500">+ MOMENT</button>
        </section>

        <section id="musik" class="page space-y-4">
            <div id="songs-list" class="space-y-3"></div>
            <button onclick="addSong()" class="admin-only w-full py-4 border-2 border-dashed border-gray-800 rounded-2xl text-gray-500">+ SONG</button>
        </section>

        <section id="kontakt" class="page">
            <div id="contacts-list" class="space-y-4 pt-4"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0a0a0a]/90 backdrop-blur-xl border-t border-white/5 px-8 py-4 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <a href="javascript:void(0)" onclick="showPage('start', this)" class="nav-item active"><i class="fas fa-home text-xl"></i><span>Start</span></a>
            <a href="javascript:void(0)" onclick="showPage('musik', this)" class="nav-item"><i class="fas fa-music text-xl"></i><span>Musik</span></a>
            <a href="javascript:void(0)" onclick="showPage('kontakt', this)" class="nav-item"><i class="fas fa-envelope text-xl"></i><span>Kontakt</span></a>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeGsLFF1jBoF8Ao8xy7OtcMhu5b4z_zVg",
            authDomain: "jerome-website-da5b3.firebaseapp.com",
            projectId: "jerome-website-da5b3",
            storageBucket: "jerome-website-da5b3.firebasestorage.app",
            messagingSenderId: "95494190010",
            appId: "1:95494190010:web:6d6715eb22e0993873a383"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let songs = [];
        let moments = [];
        // DEINE KONTAKTE (Hier kannst du Email/Nummer anpassen)
        let contacts = [
            {p: 'Instagram', n: '@jerome_life', i: 'fa-instagram'},
            {p: 'Snapchat', n: 'jerome.jk', i: 'fa-snapchat'},
            {p: 'E-Mail', n: 'dein-name@gmail.com', i: 'fa-envelope'},
            {p: 'Mobil', n: '+49 176 ...', i: 'fa-phone'}
        ];

        window.showPage = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active');
        };

        window.renderAll = () => {
            const isAdmin = document.body.classList.contains('is-admin');
            
            document.getElementById('songs-list').innerHTML = songs.map((s, i) => `
                <div class="glass-card p-4 flex items-center gap-4">
                    <div class="w-10 h-10 bg-gray-800 rounded-lg flex items-center justify-center text-[#d4af37]"><i class="fas fa-play text-xs"></i></div>
                    <div class="flex-1"><div class="font-bold text-sm">${s.title}</div><div class="text-xs text-gray-500">${s.artist}</div></div>
                    ${isAdmin ? `<button onclick="remove('songs', ${i})" class="text-red-500 p-2">✕</button>` : ''}
                </div>
            `).join('');

            document.getElementById('moments-list').innerHTML = moments.map((m, i) => `
                <div class="glass-card overflow-hidden">
                    <img src="${m.img || 'https://images.unsplash.com/photo-1514525253361-bee8a48740ad?w=800'}" class="w-full h-64 object-cover opacity-70">
                    <div class="p-4"><div class="text-xs text-[#d4af37] font-bold italic mb-1">${m.date}</div><div class="text-sm text-gray-300 leading-relaxed">${m.text}</div></div>
                    ${isAdmin ? `<button onclick="remove('moments', ${i})" class="absolute top-2 right-2 bg-black/60 w-8 h-8 rounded-full flex items-center justify-center">✕</button>` : ''}
                </div>
            `).join('');

            document.getElementById('contacts-list').innerHTML = contacts.map(c => `
                <div class="glass-card p-5 flex justify-between items-center">
                    <span class="text-sm"><i class="fab ${c.i} mr-3 text-[#d4af37]"></i>${c.p}: <span class="text-gray-400 ml-2">${c.n}</span></span>
                    <i class="fas fa-chevron-right text-[10px] text-gray-700"></i>
                </div>
            `).join('');
        };

        window.login = async () => {
            const code = prompt("Admin-Passwort:");
            if(code) {
                try { 
                    await signInWithEmailAndPassword(auth, "admin@jerome.de", code); 
                } catch(e) { alert("Code ungültig! Prüfe Firebase Authentication."); }
            }
        };

        window.addSong = () => {
            const title = prompt("Titel:");
            const artist = prompt("Künstler:");
            if(title && artist) { songs.push({title, artist}); renderAll(); }
        };

        window.addMoment = () => {
            const text = prompt("Was gibt's Neues?");
            if(text) { moments.push({text, date: new Date().toLocaleDateString('de-DE'), img: ''}); renderAll(); }
        };

        window.remove = (type, i) => {
            if(type === 'songs') songs.splice(i, 1); else moments.splice(i, 1);
            renderAll();
        };

        window.saveData = async () => {
            try {
                await setDoc(doc(db, "content", "jk_pro_data"), { songs, moments });
                alert("Erfolgreich gespeichert! ✅");
            } catch (e) { alert("Fehler: " + e.message); }
        };

        onAuthStateChanged(auth, (user) => {
            if(user) document.body.classList.add('is-admin');
            else document.body.classList.remove('is-admin');
            renderAll();
        });

        window.onload = async () => {
            try {
                const docSnap = await getDoc(doc(db, "content", "jk_pro_data"));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    songs = data.songs || [];
                    moments = data.moments || [];
                }
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
                renderAll();
            }
        };
    </script>
</body>
</html>
